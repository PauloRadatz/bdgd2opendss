- id: etapa17_faseamento_mismatch
  phase: etapa17
  validation: check_faseamento
  table: SSDMT
  field: FAS_CON
  # 2624 and 2625 are in direct series sharing node 90311, which is degree-2 in the
  # full MT faseamento graph. That makes find_seq() pick one as the other's electrical
  # parent regardless of the networkx BFS traversal order (stable across nx 3.5/3.6),
  # so the incompatible phasing (A upstream vs BC downstream) always triggers the error.
  record_key: {column: COD_ID, value: "2625"}
  inject_value: "BC"
  secondary_injections:
    - table: SSDMT
      record_key: {column: COD_ID, value: "2624"}
      inject_fields:
        FAS_CON: "A"
  injected_problem: Use incompatible MT phasing between adjacent sequenced segments.
  expected_message_contains: "Elemento com faseamento inadequado"
  expected_table: SSDMT

- id: etapa17_propagacao_mismatch
  phase: etapa17
  validation: check_propagacao
  table: SSDBT
  field: FAS_CON
  record_key: {column: COD_ID, value: "5912"}
  inject_value: "ABN"
  injected_problem: >-
    Set SSDBT 5912 (originally CAN) to ABN. It shares degree-2 node BT89041 with
    its series sibling SSDBT 5911 (CAN) under transformer 1_74 on feeder
    1_TAP2_1. CAN and ABN are mutually incompatible (each carries a phase the
    other lacks), so the propagation mismatch fires regardless of the networkx
    BFS parent/child traversal order.
  expected_message_contains: "propagação de fase inadequada"
  expected_table: SSDBT

