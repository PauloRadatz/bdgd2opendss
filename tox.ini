[tox]
envlist = py311, py312, py313, py314, flake8
minversion = 4.0
skip_missing_interpreters = true
package = editable

[testenv]
basepython = python3.14
setenv =
    PYTHONPATH = {toxinidir}
deps =
    pytest>=7.0.0
    pytest-cov>=4.0.0
commands =
    pytest --basetemp={envtmpdir} -v

[testenv:py311]
basepython = python3.11
description = Test with Python 3.11

[testenv:py312]
basepython = python3.12
description = Test with Python 3.12

[testenv:py313]
basepython = python3.13
description = Test with Python 3.13

[testenv:py314]
basepython = python3.14
description = Test with Python 3.14

[testenv:flake8]
basepython = python3.14
description = Full pytest suite on Python 3.14 (legacy env name)

